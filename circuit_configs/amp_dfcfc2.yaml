# Training device
train_device: "cpu"

# Simulation template directory
base_dir: ../simulation_files/amp_dfcfc2
file_paths:
  ACDC_cir_path: "AMP_DFCFC2_ACDC.cir"
  Tran_cir_path: "AMP_DFCFC2_Tran.cir"
  netlist_path: "AMP_DFCFC2_Pin_3_HSPICE_130.txt"
  vars_path: "AMP_DFCFC2_vars.spice"
  dev_params_path: "AMP_DFCFC2_dev_params.spice"
  op_mean_std_path: "AMP_DFCFC2_op_mean_std.json"
  
  dc_results_path: "AMP_DFCFC2_ACDC_DC"
  ac_results_path: "AMP_DFCFC2_ACDC_AC"
  op_results_path: "AMP_DFCFC2_op"
  GBW_PM_path: "AMP_DFCFC2_ACDC_GBW_PM"  
  tran_results_path: "AMP_DFCFC2_Tran"
  tran_dat_path: "AMP_DFCFC2_tran.dat"

# Design variables
device:
  M0: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 8}
  M8: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 2}
  M10: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 1}
  M11: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 1}
  M12: {range: {W: [0.5, 10], L: [0.5, 5], M: [100, 500]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 1}
  M18: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 10}
  M23: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 2}
  M25: {range: {W: [0.5, 10], L: [0.5, 5], M: [1, 50]}, step: {W: 0.1, L: 0.1, M: 1}, init: {W: 1, L: 1, M: 4}, num: 1}
  Ib: {range: {I: [1e-6, 30e-6]}, init: {I: 1e-5}, num: 1}
  C0: {range: {M: [1, 30]}, step: {M: 1}, init: {M: 10}, num: 1}
  C1: {range: {M: [1, 30]}, step: {M: 1}, init: {M: 10}, num: 1}
# Action dimension
action_dim: 27

# Performance targets
performance:
  phase_margin: {target: 60} #unit:deg
  dcgain: {target: 130, objective: max, baseline: 90} #unit:dB
  PSRP: {target: -100, objective: min, baseline: -60} #unit:dB
  PSRN: {target: -100, objective: min, baseline: -60} #unit:dB
  PSRR: {target: -80, objective: min, baseline: -60} #unit:dB
  cmrrdc: {target: -80, objective: min, baseline: -60} #unit:dB
  vos: {target: 1e-3, objective: min, baseline: 0.1e-3} #unit:V
  TC: {target: 10e-6, objective: min, baseline: 50e-6} #unit:
  settlingTime: {target: 1e-6, objective: min, baseline: 5e-6} #unit:s
  FOML: {target: 2000, objective: max, baseline: 400} #V/us*pF/mW
  FOMS: {target: 5000, objective: max, baseline: 1000} #MHz*pF/mW
  Active_Area: {target: 80, objective: min, baseline: 100} #unit:mm^2
  Power: {target: 0.25, objective: min, baseline: 0.3} #unit:mW
  GBW: {target: 4e6, objective: max, baseline: 4e6} #unit:Hz
  sr: {target: 1.25, objective: max, baseline: 1.2} #unit:V/us

# Load capacitance
post_target_bonus:
  enabled: true
  scale: 1.0
  max_per_metric: 1.0
  metrics: [FOML, FOMS, Active_Area]
PARAM_CLOAD: 100  

